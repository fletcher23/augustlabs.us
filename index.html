<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>August Labs | Independent Software Studio</title>
  <meta
    name="description"
    content="August Labs designs apps that bring world-class automation to everyday life."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="studio-card">
      <img
        class="logo"
        src="assets/AugustLabs_logo_tx.svg"
        alt="August Labs"
      />

      <div class="copy-block">
        <h1>
          We design apps that bring
          <span>world-class automation</span>
          to everyday life.
        </h1>
        <p class="subhead">
          Software that makes the ordinary feel extraordinarily designed.
        </p>
        <a class="button" href="mailto:dan@augustlabs.us">Get In Touch</a>
      </div>

      <blockquote class="quote">
        <p>"There is a way to do it better. Find it."</p>
        <cite>— Thomas Edison</cite>
      </blockquote>

      <div class="products">
        <p class="products-label">Products</p>
        <a class="product-card" href="https://manifest.augustlabs.us" target="_blank" rel="noopener">
          <div class="product-info">
            <span class="product-name">369 Manifest</span>
            <span class="product-desc">AI-powered daily manifestation ritual</span>
          </div>
          <span class="product-arrow">↗</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
